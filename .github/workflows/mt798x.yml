name: mt798x_CI

env:
  REPO_URL: https://github.com/padavanonly/immortalwrt-mt798x-6.6
  REPO_BRANCH: openwrt-23.05

on:
  workflow_dispatch:

jobs:
  build:
    permissions: write-all
    runs-on: ubuntu-22.04

    env:
      build_variant: ${{ matrix.build_variant }}
      platform: ${{ matrix.platform }}

    strategy:
      fail-fast: false
      matrix:
        include:
          - build_variant: mt7981-ax3000
            platform: mt7981

          - build_variant: mt7986-ax4200
            platform: mt7986

          - build_variant: mt7986-ax6000-256m
            platform: mt7986

          - build_variant: mt7986-ax6000
            platform: mt7986

    steps:
      - name: Maximize build space
        uses: easimon/maximize-build-space@v8
        with:
          swap-size-mb: 512
          temp-reserve-mb: 1
          # Reserve enough root space for apt (~250MB lists + packages + dpkg tmp)
          root-reserve-mb: 4096
          remove-dotnet: 'true'
          remove-android: 'true'
          remove-haskell: 'true'
          remove-codeql: 'true'

      - name: Checkout
        uses: actions/checkout@v4

      - name: Init build dependencies
        env:
          DEBIAN_FRONTEND: noninteractive
        run: |
          sudo apt clean
          sudo rm -rf /var/lib/apt/lists/*
          sudo apt update -y
          sudo apt install -y --no-install-recommends ack antlr3 asciidoc autoconf automake autopoint binutils bison build-essential \
          bzip2 ccache clang clangd cmake cpio curl device-tree-compiler ecj fastjar flex gawk gettext gcc-multilib \
          g++-multilib git gperf haveged help2man intltool lib32gcc-s1 libc6-dev-i386 libelf-dev libglib2.0-dev \
          libgmp3-dev libltdl-dev libmpc-dev libmpfr-dev libncurses5-dev libncursesw5 libncursesw5-dev libreadline-dev \
          libssl-dev libtool lld lldb lrzsz mkisofs msmtp nano ninja-build p7zip p7zip-full patch pkgconf \
          python3 python3-pip python3-ply python3-docutils qemu-utils re2c rsync scons squashfs-tools subversion swig \
          texinfo uglifyjs upx-ucl unzip vim wget xmlto xxd zlib1g-dev
          sudo apt clean
          sudo rm -rf /var/lib/apt/lists/*

      - name: Prepare
        run: |
          build_date="$(date +%Y%m%d)"
          image_prefix=immortalwrt-${build_variant}-scutclient
          echo "image_name=${image_prefix}-${build_date}" >> $GITHUB_ENV
          echo "release_tag=immortalwrt-mt798x-scutclient-${build_date}" >> $GITHUB_ENV

          git clone --depth=1 -b $REPO_BRANCH $REPO_URL openwrt
          bash scripts/apply_2305_adapted_devices.sh openwrt
          bash scripts/enable_2305_existing_devices.sh openwrt

          # Fix: keep standard /sbin/wifi (needed by mtwifi-cfg).
          # Previously this was deleted because CI used luci-app-mtk+wifi-profile,
          # but now all variants use mtwifi-cfg which requires the standard /sbin/wifi.
          # Also fix mt7986 defconfigs that still reference luci-app-mtk/wifi-profile.
          sed -i 's/^CONFIG_PACKAGE_luci-app-mtk=y/CONFIG_PACKAGE_luci-app-mtwifi-cfg=y\nCONFIG_PACKAGE_luci-i18n-mtwifi-cfg-zh-cn=y\nCONFIG_PACKAGE_mtwifi-cfg=y\n# CONFIG_PACKAGE_luci-app-mtk is not set/' openwrt/defconfig/mt7986-ax4200.config
          sed -i 's/^CONFIG_PACKAGE_wifi-profile=y/# CONFIG_PACKAGE_wifi-profile is not set/' openwrt/defconfig/mt7986-ax4200.config
          sed -i 's/^CONFIG_PACKAGE_luci-i18n-mtk-zh-cn=y/# CONFIG_PACKAGE_luci-i18n-mtk-zh-cn is not set/' openwrt/defconfig/mt7986-ax4200.config
          sed -i 's/^CONFIG_PACKAGE_luci-app-mtk=y/CONFIG_PACKAGE_luci-app-mtwifi-cfg=y\nCONFIG_PACKAGE_luci-i18n-mtwifi-cfg-zh-cn=y\nCONFIG_PACKAGE_mtwifi-cfg=y\n# CONFIG_PACKAGE_luci-app-mtk is not set/' openwrt/defconfig/mt7986-ax6000-256m.config
          sed -i 's/^CONFIG_PACKAGE_wifi-profile=y/# CONFIG_PACKAGE_wifi-profile is not set/' openwrt/defconfig/mt7986-ax6000-256m.config
          sed -i 's/^CONFIG_PACKAGE_luci-i18n-mtk-zh-cn=y/# CONFIG_PACKAGE_luci-i18n-mtk-zh-cn is not set/' openwrt/defconfig/mt7986-ax6000-256m.config

          cd openwrt
          bash ../01_prepare.sh

          cat defconfig/${build_variant}.config > .config
          bash ../02_add_package.sh
          # Use xz squashfs compression instead of default gzip (20-30% smaller firmware)
          echo "CONFIG_TARGET_SQUASHFS_XZ=y" >> .config
          make defconfig

      - name: Make Download
        run: |
          cd openwrt
          timeout 30m make download -j8 || {
            echo "Download failed with -j8, retrying with -j1 V=s..."
            timeout 20m make download -j1 V=s || {
              echo "Download failed after retry" >&2
              exit 1
            }
          }

      - name: Compile
        id: compileopenwrt
        run: |
          cd openwrt
          timeout 4h make -j$(nproc) || {
            echo "Parallel compile failed or timed out, retrying serial build..."
            timeout 2h make -j1 V=s || {
              echo "Compile failed after retry" >&2
              exit 1
            }
          }

      - name: Package
        run: |
          rm -rf ./artifact/
          mkdir -p ./artifact/
          mv openwrt/bin/targets/mediatek/${{ env.platform }}/immortalwrt-*squashfs* ./artifact/
          cd artifact
          7z a -t7z -m0=lzma2 -mx=9 -md=256m -mfb=273 -ms=on -mmt=on -myx=9 ../${{ env.image_name }}.7z .

      - name: Create release
        id: create_release
        uses: ncipollo/release-action@v1.13.0
        with:
          name: ${{ env.release_tag }}
          allowUpdates: true
          prerelease: false
          tag: ${{ env.release_tag }}
          commit: main
          replacesArtifacts: true
          token: ${{ secrets.GITHUB_TOKEN }}
          artifacts: ${{ env.image_name }}.7z
